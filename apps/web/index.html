<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Controls how the page scales on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Page title — appears in browser tab -->
    <title>DevFlow</title>

    <!-- Description — used by search engines and link previews -->
    <meta name="description" content="PR analytics and team insights for engineering teams" />
  </head>
  <body>
    <!-- React renders your entire app inside this div.
         Everything you see in the browser is injected here by React. -->
    <div id="root"></div>

    <!-- This loads your React app. "type=module" is required for Vite.
         Vite replaces this script with the real bundled code during production build. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
