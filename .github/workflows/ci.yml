# ─────────────────────────────────────────────────────────────────────────────
# WHAT IS THIS FILE?
# GitHub Actions CI pipeline.
# Runs automatically on every push and every pull request.
# If any check fails, GitHub blocks the PR from being merged.
#
# This is how professional teams prevent bad code from reaching main.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

# When to run this pipeline
on:
  # Run on every push to any branch
  push:
    branches: ['**']
  # Run on every pull request targeting main
  pull_request:
    branches: [main]

jobs:

  # ── Check the shared types package ──────────────────────────────────────────
  types:
    name: Type check — packages/types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type check types package
        run: cd packages/types && npx tsc --noEmit

  # ── Check the API ────────────────────────────────────────────────────────────
  api:
    name: Type check — API
    runs-on: ubuntu-latest
    # Wait for types to pass first
    needs: types
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type check API
        run: cd apps/api && npx tsc --noEmit

  # ── Check and build the frontend ─────────────────────────────────────────────
  web:
    name: Type check + build — Web
    runs-on: ubuntu-latest
    needs: types
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type check web
        run: cd apps/web && npx tsc --noEmit

      - name: Build web
        # This confirms the React app builds successfully for production
        # VITE_API_URL is set to a placeholder — the build just needs the var to exist
        run: cd apps/web && npx vite build
        env:
          VITE_API_URL: https://placeholder.example.com

  # ── Lint the frontend ─────────────────────────────────────────────────────────
  lint:
    name: ESLint — Web
    runs-on: ubuntu-latest
    needs: types
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint web
        # --max-warnings 50 means fail only if there are more than 50 warnings
        # We have some warnings from any types — this allows them
        run: cd apps/web && npx eslint src --max-warnings 50